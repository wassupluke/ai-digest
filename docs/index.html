<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Research Digest</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161a24;
      --border: #252a3a;
      --accent: #4f8ef7;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --muted: #64748b;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 3rem 2rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -80px; left: -80px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(79,142,247,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }

    .kicker {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      max-width: 540px;
      line-height: 1.6;
    }

    main {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    ul.digest-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .digest-list li {
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: border-color 0.15s, background 0.15s;
    }

    .digest-list li:hover {
      border-color: var(--accent);
      background: rgba(79,142,247,0.04);
    }

    a.digest-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.1rem;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-family: var(--font-mono);
    }

    a.digest-link::after {
      content: '→';
      color: var(--muted);
      transition: color 0.15s, transform 0.15s;
    }

    .digest-list li:hover a.digest-link::after {
      color: var(--accent);
      transform: translateX(3px);
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 4rem 0;
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="kicker">Automated · Monthly · Autonomous</div>
      <h1>AI Research<br>Digest</h1>
      <p class="subtitle">
        A monthly synthesis of recent arXiv papers in cs.AI and cs.SE,
        filtered for Claude optimization techniques and actionable prompting guidance.
      </p>
    </div>
  </header>

  <main>
    <div class="section-label">Issues</div>

    <ul class="digest-list">
      <!-- DIGESTS -->
      <li><a href="digests/2026-03-01.html" class="digest-link">Digest — 2026-03-01</a></li>
      <!-- New digest entries are injected above this line by digest.py -->
    </ul>

    <noscript>
      <div class="empty-state">No digests yet — the first one runs Monday.</div>
    </noscript>
  </main>

  <footer>Generated by Claude · Anthropic API · GitHub Actions</footer>
</body>
</html>
